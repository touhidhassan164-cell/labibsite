<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labib Impact — Truth Amongst the Pages of Purana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-dark:#0a1714;
    --bg-darker:#060e0c;
    --teal-glow:#7fe0e0;
    --gold:#e9dfc2;
    --text-soft:#cfe6e2;
    --text-dim:#7d9a96;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    font-family:'Poppins', sans-serif;
    background:var(--bg-darker);
    color:var(--text-soft);
  }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    width:100%;
    aspect-ratio: 1441 / 720;
    overflow:hidden;
  }

  .hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  /* invisible clickable area placed over the original "PC Download" pill
     so the look of the image stays the same, but clicking it does
     something else entirely */
  .download-trigger{
    position:absolute;
    left:51%;
    top:87%;
    width:15%;
    height:9%;
    transform:translate(-50%,-50%);
    border-radius:40px;
    cursor:pointer;
    transition:box-shadow 0.25s ease, background 0.25s ease;
  }

  .download-trigger:hover{
    background:rgba(255,255,255,0.06);
    box-shadow:0 0 25px 4px rgba(127,224,224,0.35);
  }

  .hero-caption{
    position:absolute;
    bottom:2%;
    right:2%;
    font-family:'Poppins', sans-serif;
    font-size:0.7rem;
    letter-spacing:0.15em;
    color:rgba(255,255,255,0.35);
    text-transform:uppercase;
    pointer-events:none;
  }

  /* ---------- FOOTER ---------- */
  .site-footer{
    background:var(--bg-dark);
    padding:64px 24px 40px;
    text-align:center;
  }

  .footer-logo{
    font-family:'Cinzel', serif;
    font-weight:700;
    font-size:2rem;
    letter-spacing:0.35em;
    color:var(--gold);
    text-shadow:0 0 18px rgba(233,223,194,0.25);
  }

  .footer-links{
    margin-top:32px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:28px;
  }

  .footer-links a{
    color:var(--text-soft);
    text-decoration:none;
    font-size:0.85rem;
    letter-spacing:0.04em;
    opacity:0.8;
    transition:opacity 0.2s ease, color 0.2s ease;
  }

  .footer-links a:hover{
    opacity:1;
    color:var(--teal-glow);
  }

  /* ---------- "rating" box ---------- */
  .rating-box{
    margin:40px auto 0;
    max-width:420px;
    border:2px solid var(--text-soft);
    border-radius:4px;
    display:flex;
    overflow:hidden;
    background:#0d1c19;
  }

  .rating-box .badge{
    flex:0 0 90px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    border-right:2px solid var(--text-soft);
    padding:10px 6px;
    font-family:'Cinzel', serif;
  }

  .rating-box .badge .top{
    font-size:0.6rem;
    letter-spacing:0.1em;
    border:1px solid var(--text-soft);
    border-radius:2px;
    padding:1px 6px;
    margin-bottom:6px;
  }

  .rating-box .badge .big{
    font-size:2.2rem;
    font-weight:700;
    line-height:1;
    color:var(--teal-glow);
  }

  .rating-box .badge .bottom{
    font-size:0.6rem;
    letter-spacing:0.1em;
    border:1px solid var(--text-soft);
    border-radius:2px;
    padding:1px 6px;
    margin-top:6px;
  }

  .rating-box .details{
    flex:1;
    text-align:left;
    padding:14px 16px;
    font-size:0.78rem;
    line-height:1.6;
    color:var(--text-soft);
  }

  .rating-box .details .label{
    color:var(--text-dim);
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-size:0.65rem;
    margin-top:8px;
  }

  /* ---------- legal-style lines ---------- */
  .legal-lines{
    margin-top:36px;
    font-size:0.8rem;
    line-height:1.9;
    color:var(--text-dim);
  }

  .legal-lines strong{
    color:var(--text-soft);
  }

  .brand-wordmark{
    margin-top:48px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
  }

  .brand-wordmark .ring{
    width:34px;
    height:34px;
    border-radius:50%;
    border:3px solid var(--teal-glow);
    border-left-color:transparent;
    transform:rotate(45deg);
  }

  .brand-wordmark .text{
    font-family:'Poppins', sans-serif;
    font-weight:600;
    font-size:1.4rem;
    letter-spacing:0.12em;
    color:var(--text-soft);
  }

  .copyright{
    margin-top:28px;
    font-size:0.75rem;
    color:var(--text-dim);
    letter-spacing:0.05em;
  }

  @media (max-width:600px){
    .footer-logo{ font-size:1.4rem; letter-spacing:0.25em; }
    .rating-box{ flex-direction:column; }
    .rating-box .badge{ border-right:none; border-bottom:2px solid var(--text-soft); flex-direction:row; gap:8px; padding:10px; }
  }
</style>
</head>
<body>

  <section class="hero">
    <img src="hero.jpg" alt="Labib Impact hero banner">
    <a class="download-trigger" href="https://youtu.be/dQw4w9WgXcQ?si=6e-SPm0NF9U6kdEH" target="_blank" rel="noopener" aria-label="PC Download"></a>
    <span class="hero-caption">labibertestweb.cc</span>
  </section>

  <footer class="site-footer">
    <div class="footer-logo">LABIB IMPACT</div>

    <nav class="footer-links">
      <a href="#">Privacy Policy</a>
      <a href="#">Terms of Service</a>
      <a href="#">About Us</a>
      <a href="#">Contact Us</a>
      <a href="#">Help Center</a>
    </nav>

    <div class="rating-box">
      <div class="badge">
        <span class="top">FRIEND</span>
        <span class="big">G</span>
        <span class="bottom">GROUP</span>
      </div>
      <div class="details">
        Approved Squad Content
        <div class="label">Contains</div>
        Bad Jokes, Late Night Calls, Group Project Carrying
      </div>
    </div>

    <div class="legal-lines">
      <div><strong>Noyon</strong> likes Labib.</div>
      <div><strong>Safayet</strong> likes Sahil.</div>
    </div>

    <div class="brand-wordmark">
      <span class="ring"></span>
      <span class="text">LABIBVERSE</span>
    </div>

    <div class="copyright">Copyright © LABIB ENTERTAINMENT. All Rights Reserved.</div>
  </footer>

</body>
</html>
